name: Build Windows portable

on:
  workflow_dispatch: # manual execution

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    # Install Qt using the official GitHub Action instead of apt-get
    - name: Install Qt 6.10
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.3'
        host: 'windows'
        target: 'desktop'
        dir: '${{ github.workspace }}/Qt/'
        modules: 'qtmultimedia'

#    - name: Install system build dependencies
#      run: |
#        sudo apt-get update
#        sudo apt-get install -y build-essential cmake wget libgl1-mesa-dev libpulse-dev libasound2-dev libusb-1.0-0-dev libxcb-cursor0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 libxcb-render0 libxcb-render-util0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxkbcommon-x11-0 libfontconfig1 libfreetype6

    - name: Build binary
      run: |
        New-Item -Path "." -Name "build" -ItemType "Directory" && cd build
        # Run CMake, ensuring it uses the Qt version installed by the action
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/Qt
        cmake --build .. --parallel $(nproc)

    - name: copy dependencies
      run: |
        # Install everything into release folder
        cmake --build .. -j$(nproc) --target=copy_deps

    - name: zip files
      run: |
        Compress-Archive -Path "..\..\Starvax_${REL_VERSION_MAJOR}.${REL_VERSION_MINOR}.${REL_VERSION_BUILD}" |
        -DestinationPath "..\..\Starvax_${REL_VERSION_MAJOR}.${REL_VERSION_MINOR}.${REL_VERSION_BUILD}.zip"

      # Saves the zip to the build summary page
    - name: Upload zip as Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: "starvax_player-win64.zip"
        path: "*.zip"
        if-no-files-found: error

