name: Build Linux AppImage

on:
  workflow_dispatch: # manual execution

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    # Install Qt using the official GitHub Action instead of apt-get
    - name: Install Qt 6.11
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.11.0'
        host: 'linux'
        target: 'desktop'
        modules: 'qtmultimedia'

    - name: Install system build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake wget libgl1-mesa-dev libpulse-dev libasound2-dev libusb-1.0-0-dev libxcb-cursor0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 libxcb-render0 libxcb-render-util0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxkbcommon-x11-0 libfontconfig1 libfreetype6

    - name: Build and Install Application
      run: |
        mkdir build && cd build
        # Run CMake, ensuring it uses the Qt version installed by the action
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
        make -j$(nproc)

        # Install everything into the AppDir using the rules defined in CMakeLists.txt
        make install DESTDIR=../AppDir

    - name: Download linuxdeploy and Qt plugin
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-*.AppImage

    - name: Generate AppImage
      run: |
        # Configure environment variables for linuxdeploy-plugin-qt
        export QMAKE=$QT_PLUGIN_PATH/../bin/qmake
        export EXTRA_QT_PLUGINS=multimedia

        # Signal the AppImage runtime to extract itself instead of using FUSE mounts
        export APPIMAGE_EXTRACT_AND_RUN=1

        # Run linuxdeploy without the invalid flag
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage

      # Saves the AppImage to the build summary page
    - name: Upload AppImage as Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: starvax-player-linux-appimage
        path: "*.AppImage"
        if-no-files-found: error

